<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECHOKNIVES | Secure Checkout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #1a1a3e);
            color: white;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(15,12,41,0.95);
            border-radius: 30px;
            border: 1px solid #6c5ce7;
            overflow: hidden;
        }
        .header { background: #6c5ce7; padding: 25px; text-align: center; }
        .content { padding: 30px; }
        .order-items { margin: 20px 0; }
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            margin-bottom: 10px;
        }
        .total {
            font-size: 24px;
            font-weight: bold;
            text-align: right;
            padding: 20px;
            border-top: 2px solid #6c5ce7;
            margin-top: 20px;
        }
        .pay-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            width: 100%;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #a855f7;
            text-decoration: none;
        }
        .roblox-info {
            background: rgba(108,92,231,0.2);
            padding: 15px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: center;
        }
        .loading { text-align: center; padding: 50px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h2>🔒 Secure Checkout</h2></div>
    <div class="content" id="content">
        <div class="loading">📦 Loading your order...</div>
    </div>
</div>

<script>
    // Get order data from URL
    const urlParams = new URLSearchParams(window.location.search);
    const cartParam = urlParams.get('cart');
    const robloxUser = urlParams.get('roblox');
    const orderId = urlParams.get('order_id');
    const returnUrl = urlParams.get('return');
    
    let orderData = null;
    
    // Parse cart data
    if (cartParam) {
        try {
            const items = JSON.parse(decodeURIComponent(cartParam));
            const subtotal = items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            orderData = { items, subtotal, robloxUser, orderId };
        } catch(e) { console.error('Parse error', e); }
    }
    
    // Also check sessionStorage for backup
    if (!orderData) {
        const saved = sessionStorage.getItem('echoknives_order');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                orderData = { items: data.items, subtotal: data.subtotal, robloxUser: data.robloxUser, orderId: data.orderId };
            } catch(e) {}
        }
    }
    
    // Demo order if nothing found
    if (!orderData || !orderData.items || orderData.items.length === 0) {
        orderData = {
            items: [{ name: "Demo Item", price: 100, quantity: 1 }],
            subtotal: 100,
            robloxUser: "DemoUser",
            orderId: "DEMO-" + Date.now()
        };
        document.getElementById('content').innerHTML += '<p style="color:#f59e0b; text-align:center;">⚠️ Demo Mode - No cart data received</p>';
    }
    
    function displayOrder() {
        const itemsHtml = orderData.items.map(item => `
            <div class="cart-item">
                <div><strong>${item.name}</strong><br><span style="font-size:12px;">x${item.quantity}</span></div>
                <div>₱${(item.price * item.quantity).toFixed(2)}</div>
            </div>
        `).join('');
        
        document.getElementById('content').innerHTML = `
            <div class="roblox-info">
                <i class="fab fa-roblox"></i> <strong>Delivering to:</strong> @${orderData.robloxUser || 'Not specified'}
            </div>
            <div class="order-items">${itemsHtml}</div>
            <div class="total">Total: ₱${orderData.subtotal.toFixed(2)}</div>
            <button class="pay-btn" onclick="processPayment()">💳 Complete Payment (Demo)</button>
            <a href="${returnUrl || '/'}" class="back-link">← Return to Shop</a>
        `;
    }
    
    async function processPayment() {
        const btn = document.querySelector('.pay-btn');
        btn.innerHTML = '⏳ Processing...';
        btn.disabled = true;
        
        // Simulate payment processing
        setTimeout(async () => {
            // Send success to backend
            try {
                await fetch('/api/payment-success', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ orderId: orderData.orderId, transactionId: 'TXN-' + Date.now() })
                });
            } catch(e) { console.error(e); }
            
            // Redirect back to shop with success
            const redirectUrl = returnUrl ? `${returnUrl}?payment=success&order_id=${orderData.orderId}` : '/';
            window.location.href = redirectUrl;
        }, 2000);
    }
    
    displayOrder();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
</body>
</html>
